<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin:0; background:#050d14; overflow:hidden; }
  #chart { width:100%; height:100%; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
(async function() {
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Chart lib failed'));
    document.head.appendChild(s);
  });

  const chart = window.LightweightCharts.createChart(document.getElementById('chart'), {
    width: window.innerWidth,
    height: window.innerHeight,
    layout: { background: { color: '#050d14' }, textColor: '#00aaff' },
    grid: { vertLines: { color: 'rgba(0,170,255,0.06)' }, horzLines: { color: 'rgba(0,170,255,0.06)' } },
    crosshair: { mode: 1 },
    timeScale: { borderColor: 'rgba(0,170,255,0.15)', timeVisible: true, secondsVisible: false },
    rightPriceScale: { borderColor: 'rgba(0,170,255,0.15)' },
  });

  const candles = chart.addCandlestickSeries({
    upColor: '#00aaff', downColor: '#ff4455',
    borderUpColor: '#00aaff', borderDownColor: '#ff4455',
    wickUpColor: '#00aaff', wickDownColor: '#ff4455',
    lastValueVisible: false,
    priceLineVisible: false,
    priceFormat: {
      type: 'custom',
      formatter: function(p) {
        if (!p || p <= 0) return '0.00000000';
        if (p >= 1) return p.toFixed(4);
        if (p >= 0.01) return p.toFixed(6);
        if (p >= 0.0001) return p.toFixed(8);
        return p.toFixed(10);
      },
      minMove: 0.0000000100
    },
  });

  chart.applyOptions({
    rightPriceScale: { autoScale: true, scaleMargins: { top: 0.15, bottom: 0.15 }, mode: 0 },
    handleScroll: true,
    handleScale: true,
  });

  let volSeries = null;
  let currentTF = 60;
  let allTrades = [];
  let showVol = false;

  function filterOutliers(trades) {
    if (trades.length < 5) return trades;
    const prices = trades.map(t => t.price).sort((a, b) => a - b);
    const median = prices[Math.floor(prices.length / 2)];
    return trades.filter(t => t.price >= median * 0.33 && t.price <= median * 3);
  }

  function tradesToCandles(trades, tf) {
    const clean = filterOutliers(trades);
    const buckets = {};
    for (const t of clean) {
      const k = Math.floor(t.time / (tf * 60)) * (tf * 60);
      if (!buckets[k]) {
        buckets[k] = { time: k, open: t.price, high: t.price, low: t.price, close: t.price, volume: t.tok };
      } else {
        buckets[k].high  = Math.max(buckets[k].high, t.price);
        buckets[k].low   = Math.min(buckets[k].low,  t.price);
        buckets[k].close = t.price;
        buckets[k].volume += t.tok;
      }
    }
    return Object.values(buckets).sort((a, b) => a.time - b.time);
  }

  function render() {
    const c = tradesToCandles(allTrades, currentTF);
    if (c.length) {
      candles.setData(c);
      if (volSeries && showVol) {
        volSeries.setData(c.map(x => ({
          time: x.time, value: x.volume,
          color: x.close >= x.open ? 'rgba(0,170,255,0.3)' : 'rgba(255,68,85,0.3)'
        })));
      }
    }
  }

  chart.subscribeCrosshairMove(p => {
    if (p.seriesData && p.seriesData.size > 0) {
      const d = p.seriesData.values().next().value;
      if (d && d.open !== undefined) {
        const fmt = v => {
          if (!v || v <= 0) return 0;
          if (v >= 1)      return parseFloat(v.toFixed(4));
          if (v >= 0.01)   return parseFloat(v.toFixed(6));
          if (v >= 0.0001) return parseFloat(v.toFixed(8));
          return parseFloat(v.toFixed(10));
        };
        window.parent.postMessage({ type: 'ohlcv', o: fmt(d.open), h: fmt(d.high), l: fmt(d.low), cl: fmt(d.close), v: d.volume || 0 }, '*');
      } else {
        window.parent.postMessage({ type: 'ohlcv_clear' }, '*');
      }
    } else {
      window.parent.postMessage({ type: 'ohlcv_clear' }, '*');
    }
  });

  window.addEventListener('message', e => {
    const msg = e.data;
    if (msg.type === 'trades') {
      allTrades  = msg.trades || [];
      currentTF  = msg.tf    || 60;
      render();
    } else if (msg.type === 'setTF') {
      currentTF = msg.tf;
      render();
    } else if (msg.type === 'setVol') {
      showVol = msg.vol;
      if (!volSeries && showVol) {
        volSeries = chart.addHistogramSeries({
          priceFormat: { type: 'volume' },
          priceScaleId: 'vol',
          scaleMargins: { top: 0.8, bottom: 0 },
        });
      }
      render();
    }
  });

  window.addEventListener('resize', () =>
    chart.applyOptions({ width: window.innerWidth, height: window.innerHeight })
  );

  window.parent.postMessage({ type: 'chartReady' }, '*');
})();
</script>
</body>
</html>
